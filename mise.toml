[tools]
node = "24.13.1"
pnpm = "10.32.1"
"npm:@biomejs/biome" = "2.4.9"
"npm:@mariozechner/pi-coding-agent" = "0.65.0"
fnox = "1.20.0"

[tasks.build]
description = "Build the project"
run = "pnpm run build"

[tasks.test]
description = "Run all tests"
run = "pnpm run test"

[tasks."test:watch"]
description = "Run tests in watch mode"
run = "pnpm run test:watch"

[tasks.lint]
description = "Lint with biome"
run = "pnpm run lint"

[tasks.typecheck]
description = "Type-check with tsc"
run = "pnpm run typecheck"

[tasks.format]
description = "Format with biome"
run = "pnpm run format"

[tasks."format:check"]
description = "Check formatting (CI)"
run = "pnpm run format:check"

[tasks.check]
description = "Run all verification checks"
depends = ["format:check", "lint", "typecheck", "test", "build"]
